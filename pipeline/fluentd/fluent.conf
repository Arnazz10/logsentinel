# =============================================================================
# LogSentinel — Fluentd Configuration
# Collects logs from Docker containers and forwards to the Log Ingestion API
# =============================================================================

# --------------------------------------------------------------------------
# Input: Docker container logs via tail
# --------------------------------------------------------------------------
<source>
  @type tail
  @id input_docker_logs
  path /var/log/containers/*.log
  pos_file /fluentd/pos/containers.pos
  tag docker.*
  read_from_head true

  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

# --------------------------------------------------------------------------
# Input: Syslog (system-level logs)
# --------------------------------------------------------------------------
<source>
  @type syslog
  @id input_syslog
  port 5140
  tag syslog
  <parse>
    @type syslog
  </parse>
</source>

# --------------------------------------------------------------------------
# Input: HTTP (push-based log ingestion from services)
# --------------------------------------------------------------------------
<source>
  @type http
  @id input_http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s

  <parse>
    @type json
  </parse>
</source>

# --------------------------------------------------------------------------
# Filter: Add metadata and normalize log fields
# --------------------------------------------------------------------------
<filter docker.**>
  @type record_transformer
  @id filter_docker_metadata
  enable_ruby true
  <record>
    source "docker"
    container_name ${tag_parts[1]}
    # Extract log level from message if possible
    level ${record["level"] || record["severity"] || "INFO"}
    hostname "#{ENV['HOSTNAME']}"
    collected_at ${time.utc.iso8601}
  </record>
</filter>

<filter syslog.**>
  @type record_transformer
  @id filter_syslog_metadata
  <record>
    source "syslog"
    level ${record["severity"] || "INFO"}
    collected_at ${time.utc.iso8601}
  </record>
</filter>

# --------------------------------------------------------------------------
# Filter: Parse JSON log messages that contain nested JSON strings
# --------------------------------------------------------------------------
<filter docker.**>
  @type parser
  @id filter_parse_nested_json
  key_name log
  reserve_data true
  remove_key_name_field false
  emit_invalid_record_to_error false

  <parse>
    @type json
  </parse>
</filter>

# --------------------------------------------------------------------------
# Filter: Add service name based on container name
# --------------------------------------------------------------------------
<filter docker.**>
  @type record_transformer
  @id filter_service_name
  enable_ruby true
  <record>
    service ${record["container_name"].to_s.split("-").first(2).join("-") rescue "unknown"}
  </record>
</filter>

# --------------------------------------------------------------------------
# Match: Forward all logs to LogSentinel Log Ingestion API
# --------------------------------------------------------------------------
<match docker.** syslog.** http.**>
  @type http
  @id output_logsentinel_api
  endpoint http://log-ingestion-api:8000/ingest
  http_method post
  content_type application/json

  # Buffer configuration for reliability
  <buffer>
    @type file
    path /fluentd/buffer/logsentinel
    flush_interval 5s
    flush_thread_count 2
    chunk_limit_size 8MB
    total_limit_size 512MB
    retry_max_times 5
    retry_wait 1s
    retry_exponential_backoff_base 2
    overflow_action block
  </buffer>

  # Format the request body as expected by the ingestion API
  <format>
    @type json
  </format>
</match>

# --------------------------------------------------------------------------
# Match: Send errors to stderr for debugging
# --------------------------------------------------------------------------
<match fluent.**>
  @type stderr
</match>
