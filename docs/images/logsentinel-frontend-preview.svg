<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B1D12"/>
      <stop offset="0.45" stop-color="#18090C"/>
      <stop offset="1" stop-color="#090608"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF5A41"/>
      <stop offset="1" stop-color="#FF7D57"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#231217" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#130B0D" stop-opacity="0.96"/>
    </linearGradient>
    <pattern id="lines" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <rect width="20" height="20" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="0" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="0" fill="url(#lines)" opacity="0.7"/>
  <circle cx="180" cy="240" r="280" fill="#FF4D3D" opacity="0.16"/>

  <rect x="20" y="20" width="1560" height="70" rx="24" fill="#311417" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>
  <circle cx="46" cy="54" r="9" fill="#FF9A86"/>
  <text x="64" y="61" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">LogSentinel</text>
  <text x="700" y="61" fill="#E6C7BF" font-family="Arial, Helvetica, sans-serif" font-size="14">Features</text>
  <text x="770" y="61" fill="#E6C7BF" font-family="Arial, Helvetica, sans-serif" font-size="14">Workflow</text>
  <text x="852" y="61" fill="#E6C7BF" font-family="Arial, Helvetica, sans-serif" font-size="14">Security</text>
  <text x="930" y="61" fill="#E6C7BF" font-family="Arial, Helvetica, sans-serif" font-size="14">Dashboard</text>
  <rect x="1350" y="36" width="96" height="38" rx="19" fill="#3A1D20" stroke="rgba(255,255,255,0.1)"/>
  <text x="1379" y="60" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600">API Docs</text>
  <rect x="1458" y="36" width="124" height="38" rx="19" fill="url(#btn)"/>
  <text x="1476" y="60" fill="#170709" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Open Console</text>

  <text x="32" y="170" fill="#FFB39F" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="4">CLOUD-NATIVE AI OBSERVABILITY</text>
  <text x="32" y="255" fill="#FFF7F5" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">Detect the log</text>
  <text x="32" y="340" fill="#FFF7F5" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">patterns that</text>
  <text x="32" y="425" fill="#FFF7F5" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">break systems</text>
  <text x="32" y="510" fill="#FFF7F5" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">before users</text>
  <text x="32" y="595" fill="#FFF7F5" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">feel them.</text>

  <text x="32" y="670" fill="#DDBCB4" font-family="Arial, Helvetica, sans-serif" font-size="18">
    LogSentinel ingests logs in real time, streams them through Kafka, scores anomalies
  </text>
  <text x="32" y="704" fill="#DDBCB4" font-family="Arial, Helvetica, sans-serif" font-size="18">
    with Isolation Forest, and surfaces live service health in a single operations dashboard.
  </text>

  <rect x="32" y="740" width="160" height="48" rx="24" fill="url(#btn)"/>
  <text x="50" y="770" fill="#170709" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Launch Dashboard</text>
  <rect x="206" y="740" width="144" height="48" rx="24" fill="#2E171A" stroke="rgba(255,255,255,0.08)"/>
  <text x="224" y="770" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">Explore Platform</text>

  <rect x="32" y="826" width="300" height="68" rx="24" fill="#1B0E11" stroke="rgba(255,255,255,0.06)"/>
  <text x="56" y="870" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">10k/s</text>
  <text x="56" y="895" fill="#E0C0B8" font-family="Arial, Helvetica, sans-serif" font-size="13">Target ingest throughput</text>
  <rect x="344" y="826" width="300" height="68" rx="24" fill="#1B0E11" stroke="rgba(255,255,255,0.06)"/>
  <text x="368" y="870" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">&lt; 30s</text>
  <text x="368" y="895" fill="#E0C0B8" font-family="Arial, Helvetica, sans-serif" font-size="13">Anomaly alert latency goal</text>
  <rect x="656" y="826" width="300" height="68" rx="24" fill="#1B0E11" stroke="rgba(255,255,255,0.06)"/>
  <text x="680" y="870" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">5%</text>
  <text x="680" y="895" fill="#E0C0B8" font-family="Arial, Helvetica, sans-serif" font-size="13">Isolation Forest contamination</text>

  <rect x="960" y="210" width="610" height="540" rx="30" fill="url(#panel)" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>
  <text x="985" y="250" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="18">Live platform pulse</text>
  <rect x="1470" y="228" width="82" height="32" rx="16" fill="#4FE788"/>
  <text x="1487" y="249" fill="#0E140F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Operational</text>

  <rect x="985" y="286" width="274" height="148" rx="26" fill="#190C0F" stroke="rgba(255,255,255,0.06)"/>
  <text x="1005" y="326" fill="#FFC1B3" font-family="Arial, Helvetica, sans-serif" font-size="15">Logs / second</text>
  <text x="1005" y="368" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">42.40</text>

  <rect x="1275" y="286" width="274" height="148" rx="26" fill="#190C0F" stroke="rgba(255,255,255,0.06)"/>
  <text x="1295" y="326" fill="#FFC1B3" font-family="Arial, Helvetica, sans-serif" font-size="15">Anomaly rate</text>
  <text x="1295" y="368" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">1.87%</text>

  <rect x="985" y="454" width="274" height="148" rx="26" fill="#190C0F" stroke="rgba(255,255,255,0.06)"/>
  <text x="1005" y="494" fill="#FFC1B3" font-family="Arial, Helvetica, sans-serif" font-size="15">Logs last hour</text>
  <text x="1005" y="536" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">152,640</text>

  <rect x="1275" y="454" width="274" height="148" rx="26" fill="#190C0F" stroke="rgba(255,255,255,0.06)"/>
  <text x="1295" y="494" fill="#FFC1B3" font-family="Arial, Helvetica, sans-serif" font-size="15">Total anomalies</text>
  <text x="1295" y="536" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">286</text>

  <rect x="985" y="620" width="564" height="54" rx="20" fill="#201215" stroke="rgba(255,255,255,0.08)"/>
  <rect x="1003" y="637" width="54" height="28" rx="14" fill="#4A2020"/>
  <text x="1019" y="656" fill="#FF9A90" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">ERROR</text>
  <text x="1072" y="655" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="14">auth-service: Database connection timeout after 5000ms</text>

  <rect x="985" y="690" width="564" height="54" rx="20" fill="#201215" stroke="rgba(255,255,255,0.08)"/>
  <rect x="1003" y="707" width="49" height="28" rx="14" fill="#4B3920"/>
  <text x="1020" y="726" fill="#FFD487" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">WARN</text>
  <text x="1072" y="725" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="14">payment-service: Retry storm detected against upstream billing provider</text>

  <rect x="985" y="760" width="564" height="54" rx="20" fill="#201215" stroke="rgba(255,255,255,0.08)"/>
  <rect x="1003" y="777" width="46" height="28" rx="14" fill="#1F4430"/>
  <text x="1020" y="796" fill="#92EEB5" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">INFO</text>
  <text x="1072" y="795" fill="#FFF6F4" font-family="Arial, Helvetica, sans-serif" font-size="14">gateway: Steady request flow observed across the last rolling window</text>
</svg>
