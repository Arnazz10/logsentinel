# =============================================================================
# LogSentinel — Alertmanager Configuration
# Routes Prometheus alerts to Slack and/or email
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_from: "logsentinel-alerts@example.com"
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_auth_username: ""
  smtp_auth_password: ""
  smtp_require_tls: true
  slack_api_url: "https://hooks.slack.com/services/PLACEHOLDER"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: "slack-notifications"

  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      continue: true

    - match:
        severity: warning
      receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - channel: "#logsentinel-alerts"
        username: "LogSentinel Alertmanager"
        icon_emoji: ":shield:"
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: "slack-critical"
    slack_configs:
      - channel: "#logsentinel-critical"
        username: "LogSentinel CRITICAL"
        icon_emoji: ":rotating_light:"
        send_resolved: true
        title: '🚨 CRITICAL: {{ template "slack.default.title" . }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "job"]
