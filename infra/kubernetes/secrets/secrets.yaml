# =============================================================================
# LogSentinel — Kubernetes Secrets (base64 encoded placeholders)
# ⚠️  IMPORTANT: Replace these values with real secrets before deploying!
#     Use: echo -n "your-secret" | base64
#     In production, use AWS Secrets Manager + External Secrets Operator
#     instead of storing secrets in plain YAML.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: logsentinel-secrets
  namespace: logsentinel
  annotations:
    description: "LogSentinel application secrets — DO NOT commit real values"
type: Opaque
data:
  # PostgreSQL
  # echo -n "logsentinel_prod_password" | base64
  POSTGRES_PASSWORD: bG9nc2VudGluZWxfcHJvZF9wYXNzd29yZA==

  # Redis (leave empty if no password)
  REDIS_PASSWORD: ""

  # Elasticsearch basic auth (leave empty if no auth)
  ELASTICSEARCH_USERNAME: ""
  ELASTICSEARCH_PASSWORD: ""

  # Kafka SASL (leave empty if no auth)
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""

  # SMTP credentials
  # echo -n "your-smtp-password" | base64
  SMTP_USERNAME: eW91ci1lbWFpbEBnbWFpbC5jb20=
  SMTP_PASSWORD: eW91ci1hcHAtcGFzc3dvcmQ=

  # Slack webhook URL
  # echo -n "https://hooks.slack.com/services/XXX/YYY/ZZZ" | base64
  SLACK_WEBHOOK_URL: aHR0cHM6Ly9ob29rcy5zbGFjay5jb20vc2VydmljZXMvWFhYL1lZWS9aWlo=

  # Alert email recipients (JSON array)
  SMTP_TO_EMAILS: WyJhbGVydHNAeW91cmNvbXBhbnkuY29tIl0=

  # AWS credentials (used by ECR image pull)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
