# =============================================================================
# LogSentinel — ML Engine Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: logsentinel
  labels:
    app: ml-engine
    component: ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: ml-engine
          image: your-dockerhub/logsentinel-ml-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ml-engine-config
            - secretRef:
                name: logsentinel-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /model/status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ml-models
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc
