# =============================================================================
# LogSentinel — Alert Service Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: logsentinel
  labels:
    app: alert-service
    component: alerting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: alert-service
          image: your-dockerhub/logsentinel-alert-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: alert-service-config
            - secretRef:
                name: logsentinel-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
