# =============================================================================
# LogSentinel — Log Processor Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-processor
  namespace: logsentinel
  labels:
    app: log-processor
    component: processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-processor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: log-processor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: log-processor
          image: your-dockerhub/logsentinel-log-processor:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: log-processor-config
            - secretRef:
                name: logsentinel-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
