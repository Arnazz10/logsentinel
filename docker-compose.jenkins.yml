services:
  jenkins:
    build:
      context: .
      dockerfile: infra/jenkins/Dockerfile
    container_name: logsentinel-jenkins
    user: "root"
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_ADMIN_ID=logsentinel
      - JENKINS_ADMIN_PASSWORD=logsentinel
    restart: unless-stopped
    networks:
      - logsentinel-net

volumes:
  jenkins-data:
    name: logsentinel-jenkins-data

networks:
  logsentinel-net:
    driver: bridge
